apply plugin: 'com.android.application'

android {
    namespace 'com.marygame.app'
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.marygame.app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    aaptOptions {
        noCompress 'html', 'css', 'js'
    }
}

dependencies {
    // Sin dependencias externas — solo se usa el WebView nativo de Android
}
